# nginx reverse proxy for the Manufacturing Intelligence Platform.
# Single origin: dashboard at / (Next.js :3000), API at /api/ (FastAPI :8000).
# Same-origin means no CORS needed and NEXT_PUBLIC_API_BASE can be empty.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/factory
#   sudo ln -s /etc/nginx/sites-available/factory /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# TLS: run `sudo certbot --nginx -d factory.scottcampbell.io` to add HTTPS.

server {
    listen 80;
    server_name factory.scottcampbell.io;

    # API -> FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # health passthrough (optional)
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # Everything else -> Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
