# nginx reverse proxy for the Manufacturing Intelligence API.
# Frontend is hosted elsewhere; this VPS only serves FastAPI on localhost:8002.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/factory-api.scottcampbell.io.conf
#   sudo ln -s /etc/nginx/sites-available/factory-api.scottcampbell.io.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# TLS: run `sudo certbot --nginx -d factory-api.scottcampbell.io` to add HTTPS.

server {
    listen 80;
    server_name factory-api.scottcampbell.io;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
