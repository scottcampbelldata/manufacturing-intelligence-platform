name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit (no database)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx numpy pandas ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run unit tests (no database)
        run: pytest -q -m "not db"

  integration:
    name: Integration (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: manufacturing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest psycopg2-binary numpy pandas httpx

      - name: Run full test suite (generator -> load -> views -> API)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/manufacturing
        run: pytest -q

  frontend:
    name: Frontend (typecheck, test, build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, typecheck, test, build
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build
